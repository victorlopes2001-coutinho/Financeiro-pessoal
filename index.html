    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase Config
        const firebaseConfig = {

        const inc = (n) => firebase.firestore.FieldValue.increment(n);

        // ⚠️ IMPORTANTE: troque pelo MESMO e-mail que você usar ao criar a conta no
        // Console do Firebase (Authentication → Users → Add user).
        const EMAIL_LOGIN = "victor@financeiro.app";

        // Service worker: abrir offline e permitir instalar no celular
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch((e) => console.log('SW:', e));
        }

        const formatarMoeda = (valor) => valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        // Converte o que a pessoa digita em número. Entende vírgula (10,50) e ponto (10.50),
        // e ponto como separador de milhar quando há vírgula (1.250,90).
        const parseValor = (v) => {
            if (v === null || v === undefined) return NaN;
            let s = String(v).trim();
            if (s === '') return NaN;
            if (s.indexOf(',') >= 0) s = s.replace(/\./g, '').replace(',', '.');
            return Number(s);
        };
        // Gera um identificador estavel a partir do nome do tipo (sem acento/barra), p/ guardar o valor atual
        const slugInv = (s) => ((s || 'outros').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'outros');
        const formatarData = (dataString) => {
            if (!dataString) return '';
            const [ano, mes, dia] = dataString.split('-');
            return `${dia}/${mes}/${ano}`;
        };
        const getDataHoje = () => {
            const hoje = new Date();
            return `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}-${String(hoje.getDate()).padStart(2, '0')}`;
        };
        const addMeses = (dataString, n) => {
            const [ano, mes, dia] = dataString.split('-').map(Number);
            const d = new Date(ano, mes - 1 + n, 1);
            const ultimoDia = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
            const diaFinal = Math.min(dia, ultimoDia);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(diaFinal).padStart(2, '0')}`;
        };
        const PALETA_CATEGORIAS = {
            'Alimentacao': '#ef4444', 'Transporte': '#f59e0b', 'Moradia': '#3b82f6',
            'Saude': '#10b981', 'Educacao': '#8b5cf6', 'Lazer': '#ec4899',
            'Vestuario': '#14b8a6', 'Salario': '#22c55e', 'Contas': '#f97316',
            'Cartao': '#6366f1', 'Outros': '#94a3b8'
        };
        const PALETA_EXTRA = ['#0ea5e9', '#a855f7', '#f43f5e', '#84cc16', '#06b6d4', '#eab308', '#d946ef', '#64748b'];
        const corCategoria = (cat) => {
            if (PALETA_CATEGORIAS[cat]) return PALETA_CATEGORIAS[cat];
            let h = 0;
            for (let i = 0; i < (cat || '').length; i++) h = (h * 31 + cat.charCodeAt(i)) % PALETA_EXTRA.length;
            return PALETA_EXTRA[Math.abs(h)];
        };
        const polarToCartesian = (cx, cy, r, anguloGraus) => {
            const a = (anguloGraus - 90) * Math.PI / 180;
            return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
        };
        const describeArc = (cx, cy, r, anguloInicio, anguloFim) => {
            const inicio = polarToCartesian(cx, cy, r, anguloFim);
            const fim = polarToCartesian(cx, cy, r, anguloInicio);
            const largeArc = anguloFim - anguloInicio <= 180 ? '0' : '1';
            return ['M', inicio.x, inicio.y, 'A', r, r, 0, largeArc, 0, fim.x, fim.y].join(' ');
        };
        const escurecer = (hex, pct) => {
            try {
                const n = parseInt(hex.replace('#', ''), 16);
                let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
                r = Math.max(0, Math.round(r * (1 - pct / 100)));
                g = Math.max(0, Math.round(g * (1 - pct / 100)));
                b = Math.max(0, Math.round(b * (1 - pct / 100)));
                return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
            } catch (e) { return hex; }
        };

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                plus: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
                trash: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
                check: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
                circle: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2} /></svg>,
                edit: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>,
                chevronLeft: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>,
                chevronRight: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,
                moon: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>,
                sun: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
                x: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
                search: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
                refresh: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
                menu: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>,
            };
            return icons[name] || null;
        };

        const App = () => {
            // Auth states
            const [autenticado, setAutenticado] = useState(false);
            const [usuarioAtual, setUsuarioAtual] = useState(null);
            const [senhaDigitada, setSenhaDigitada] = useState('');
            const [mostrarSenha, setMostrarSenha] = useState(false);
            const [erroLogin, setErroLogin] = useState('');
            const [msgReset, setMsgReset] = useState('');
            const [carregandoLogin, setCarregandoLogin] = useState(false);
            const [verificandoAuth, setVerificandoAuth] = useState(true);
            const [mostrarTrocarSenha, setMostrarTrocarSenha] = useState(false);
            const [senhaAtual, setSenhaAtual] = useState('');
            const [novaSenha, setNovaSenha] = useState('');
            const [confirmarSenha, setConfirmarSenha] = useState('');

            // App de uso pessoal: um único perfil (Victor)
            const VICTOR = { nome: "Victor", cor: "var(--cor-primaria)", emoji: "👨" };
            const [promptInstalar, setPromptInstalar] = useState(null);
            const [mostrarAddRapido, setMostrarAddRapido] = useState(false);
            const [formRapido, setFormRapido] = useState({ tipo: 'despesa', descricao: '', valor: '', categoria: '', data: getDataHoje(), pago: false, contaId: null });
            const [mostrarLembrete, setMostrarLembrete] = useState(false);
            const [menuAberto, setMenuAberto] = useState(false);
            const [aviso, setAviso] = useState(null);
            const [online, setOnline] = useState(typeof navigator !== 'undefined' ? navigator.onLine : true);
            const [mostrarBackup, setMostrarBackup] = useState(false);
            const [ultimoBackup, setUltimoBackup] = useState(() => localStorage.getItem('fin-ultimo-backup') || '');
            const [backupDispensado, setBackupDispensado] = useState(false);
            const [mostrarPersonalizar, setMostrarPersonalizar] = useState(false);
            const [corPrimaria, setCorPrimaria] = useState(() => localStorage.getItem('fin-cor') || '#7c3aed');
            const [papelParede, setPapelParede] = useState(() => localStorage.getItem('fin-papel') || '');

            // App states
            const [activeTab, setActiveTab] = useState('dashboard');
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('fin-dark') === '1');
            const [sincronizando, setSincronizando] = useState(false);
            const [ultimaSync, setUltimaSync] = useState(null);
            // Trava anti-toque-duplo: impede salvar a mesma coisa 2x (ref = trava imediata; estado = visual)
            const salvandoRef = useRef(false);
            const [salvando, setSalvando] = useState(false);
            const executar = async (fn) => {
                if (salvandoRef.current) return;
                salvandoRef.current = true;
                setSalvando(true);
                try { await fn(); } finally { salvandoRef.current = false; setSalvando(false); }
            };

            // Data states
            const [transacoes, setTransacoes] = useState([]);
            const [contas, setContas] = useState([]);
            const [investimentos, setInvestimentos] = useState([]);
            const [parcelas, setParcelas] = useState([]);
            const [extras, setExtras] = useState([]);
            const [mesExtra, setMesExtra] = useState(new Date().getMonth());
            const [anoExtra, setAnoExtra] = useState(new Date().getFullYear());

            // Form states
            const [formTransacao, setFormTransacao] = useState({ tipo: 'despesa', descricao: '', valor: '', categoria: '', data: getDataHoje(), pago: false, contaId: null, repetir: false, numMeses: 12 });
            const [formConta, setFormConta] = useState({ nome: '', saldoInicial: '', tipo: 'corrente' });
            const [formInvestimento, setFormInvestimento] = useState({ tipo: 'aplicacao', descricao: '', valor: '', categoria: 'Renda Fixa', data: getDataHoje(), contaId: null });
            const [formParcela, setFormParcela] = useState({ descricao: '', valorTotal: '', numParcelas: '', diaVencimento: '', categoria: 'Outros', contaId: null, lancarFinancas: false, tipo: 'despesa' });
            const [formExtra, setFormExtra] = useState({ tipo: 'despesa', categoria: '', descricao: '', valor: '', data: getDataHoje(), forma: 'debito', contaId: null });
            const [editandoExtra, setEditandoExtra] = useState(null);
            const [formEdicaoExtra, setFormEdicaoExtra] = useState({});
            const [categoriasCustomDocs, setCategoriasCustomDocs] = useState([]);
            const [novaCategoria, setNovaCategoria] = useState('');
            const [valoresInvDocs, setValoresInvDocs] = useState([]);
            const [editandoValorTipo, setEditandoValorTipo] = useState(null);
            const [valorTipoInput, setValorTipoInput] = useState('');

            // UI states
            const [mostrarFormConta, setMostrarFormConta] = useState(false);
            const [mostrarFormParcela, setMostrarFormParcela] = useState(false);
            const [editandoParcela, setEditandoParcela] = useState(null);
            const [formEdicaoParcela, setFormEdicaoParcela] = useState({});
            const [editandoConta, setEditandoConta] = useState(null);
            const [novoSaldoConta, setNovoSaldoConta] = useState('');
            const [editandoTransacao, setEditandoTransacao] = useState(null);
            const [formEdicao, setFormEdicao] = useState({});
            const [dandoBaixa, setDandoBaixa] = useState(null);
            const [contaBaixa, setContaBaixa] = useState(null);

            // Filter states
            const [filtroFinanceiro, setFiltroFinanceiro] = useState('todas');
            const [filtroTipo, setFiltroTipo] = useState('todos');
            const [busca, setBusca] = useState('');
            const [dataInicio, setDataInicio] = useState('');
            const [dataFim, setDataFim] = useState('');
            const [mostrarFiltros, setMostrarFiltros] = useState(false);

            // Calendar states
            const [mesAtual, setMesAtual] = useState(new Date().getMonth());
            const [anoAtual, setAnoAtual] = useState(new Date().getFullYear());
            const [tipoGrafico, setTipoGrafico] = useState('despesa');
            const [mesFin, setMesFin] = useState(new Date().getMonth());
            const [anoFin, setAnoFin] = useState(new Date().getFullYear());

            const categoriasPadrao = ['Alimentacao', 'Transporte', 'Moradia', 'Saude', 'Educacao', 'Lazer', 'Vestuario', 'Salario', 'Contas', 'Cartao', 'Outros'];
            // Lista final = categorias padrão + as personalizadas (criadas por você); "Outros" sempre por último
            const categorias = (() => {
                const nomesCustom = categoriasCustomDocs.map(c => c.nome).filter(Boolean);
                const base = categoriasPadrao.filter(c => c !== 'Outros');
                const vistos = new Set();
                const lista = [];
                [...base, ...nomesCustom].forEach(n => {
                    const k = n.toLowerCase();
                    if (!vistos.has(k) && k !== 'outros') { vistos.add(k); lista.push(n); }
                });
                return [...lista, 'Outros'];
            })();
            const categoriasInv = ['Renda Fixa', 'Acoes', 'FIIs', 'Tesouro Direto', 'CDB', 'LCI/LCA', 'Criptomoedas', 'Poupanca', 'Outros'];
            const mesesNomes = ['Janeiro', 'Fevereiro', 'Marco', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];

            // Firebase listeners
            useEffect(() => {
                if (!usuarioAtual) return;
                setSincronizando(true);
                const prefixo = `${usuarioAtual}_`;
                
                const unsubs = [
                    db.collection(prefixo + 'transacoes').onSnapshot(snap => {
                        setTransacoes(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setUltimaSync(new Date());
                        setSincronizando(false);
                    }, err => {
                        console.error('Erro de sincronização:', err);
                        setSincronizando(false);
                    }),
                    db.collection(prefixo + 'contas').onSnapshot(snap => setContas(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })))),
                    db.collection(prefixo + 'investimentos').onSnapshot(snap => setInvestimentos(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })))),
                    db.collection(prefixo + 'parcelas').onSnapshot(snap => setParcelas(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })))),
                    db.collection(prefixo + 'extras').onSnapshot(snap => setExtras(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })))),
                    db.collection(prefixo + 'categorias').onSnapshot(snap => setCategoriasCustomDocs(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })))),
                    db.collection(prefixo + 'investValores').onSnapshot(snap => setValoresInvDocs(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))))
                ];
                
                return () => unsubs.forEach(u => u());
            }, [usuarioAtual]);

            // Calculos
            const totalReceitas = transacoes.filter(t => t.tipo === 'receita' && t.pago).reduce((a, t) => a + t.valor, 0);
            const totalDespesas = transacoes.filter(t => t.tipo === 'despesa' && t.pago).reduce((a, t) => a + t.valor, 0);
            const despesasPendentes = transacoes.filter(t => t.tipo === 'despesa' && !t.pago).reduce((a, t) => a + t.valor, 0);
            const saldoContas = contas.reduce((a, c) => a + c.saldo, 0);
            const totalInvestido = investimentos.filter(i => i.tipo === 'aplicacao').reduce((a, i) => a + i.valor, 0) - investimentos.filter(i => i.tipo === 'resgate').reduce((a, i) => a + i.valor, 0);
            // Investido e valor atual por TIPO (Ações, FIIs, etc.) — o valor atual é informado manualmente
            const investPorTipo = (() => {
                const map = {};
                investimentos.forEach(i => {
                    const cat = i.categoria || 'Outros';
                    if (!map[cat]) map[cat] = { categoria: cat, investido: 0 };
                    map[cat].investido += (i.tipo === 'aplicacao' ? i.valor : -i.valor);
                });
                return Object.values(map)
                    .filter(x => Math.abs(x.investido) > 0.005)
                    .map(x => {
                        const slug = slugInv(x.categoria);
                        const doc = valoresInvDocs.find(v => v.id === slug);
                        const valorAtual = doc && typeof doc.valorAtual === 'number' ? doc.valorAtual : null;
                        const rendimento = valorAtual != null ? valorAtual - x.investido : null;
                        const rendPct = (valorAtual != null && x.investido > 0) ? (rendimento / x.investido) * 100 : null;
                        return { ...x, slug, valorAtual, rendimento, rendPct };
                    })
                    .sort((a, b) => b.investido - a.investido);
            })();
            const totalInvestidoTipos = investPorTipo.reduce((s, x) => s + x.investido, 0);
            const totalAtualTipos = investPorTipo.reduce((s, x) => s + (x.valorAtual != null ? x.valorAtual : x.investido), 0);
            const rendimentoTotal = totalAtualTipos - totalInvestidoTipos;
            // Parcelas "lançadas em Finanças" têm o progresso calculado pelas transações ligadas (serieId)
            const parcelasPagasDe = (p) => p.lancadoFinancas ? transacoes.filter(t => t.serieId === p.serieId && t.pago).length : (p.parcelasPagas || 0);
            const totalParcelasPendentes = parcelas.reduce((a, p) => a + ((p.numParcelas - parcelasPagasDe(p)) * p.valorParcela), 0);

            // Resumo por mês (cartões do topo = mês atual; dashboard/gráfico = mês selecionado)
            // Exclui as parcelas lançadas em Finanças daqui: elas já contam como transações (evita contar 2x)
            const parcelasMes = parcelas.filter(p => !p.lancadoFinancas && (p.numParcelas - parcelasPagasDe(p)) > 0).reduce((a, p) => a + p.valorParcela, 0);
            const chaveMesReal = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}`;
            const txMesReal = transacoes.filter(t => (t.data || '').substring(0, 7) === chaveMesReal);
            const receitasMesReal = txMesReal.filter(t => t.tipo === 'receita').reduce((a, t) => a + t.valor, 0);
            const despesasMesReal = txMesReal.filter(t => t.tipo === 'despesa').reduce((a, t) => a + t.valor, 0);
            const aPagarMesReal = txMesReal.filter(t => t.tipo === 'despesa' && !t.pago).reduce((a, t) => a + t.valor, 0) + parcelasMes;

            const chaveMesSel = `${anoAtual}-${String(mesAtual + 1).padStart(2, '0')}`;
            const txMesSel = transacoes.filter(t => (t.data || '').substring(0, 7) === chaveMesSel);
            const receitasMesSel = txMesSel.filter(t => t.tipo === 'receita').reduce((a, t) => a + t.valor, 0);
            const despesasMesSel = txMesSel.filter(t => t.tipo === 'despesa').reduce((a, t) => a + t.valor, 0);
            const pendentesMesSel = txMesSel.filter(t => t.tipo === 'despesa' && !t.pago).reduce((a, t) => a + t.valor, 0);
            const saldoMesSel = receitasMesSel - despesasMesSel;

            // Filtrar transações
            const transacoesFiltradas = transacoes.filter(t => {
                if (busca && !t.descricao.toLowerCase().includes(busca.toLowerCase())) return false;
                if (filtroFinanceiro === 'pagas' && !t.pago) return false;
                if (filtroFinanceiro === 'pendentes' && t.pago) return false;
                if (filtroTipo === 'receitas' && t.tipo !== 'receita') return false;
                if (filtroTipo === 'despesas' && t.tipo !== 'despesa') return false;
                if (dataInicio && t.data < dataInicio) return false;
                if (dataFim && t.data > dataFim) return false;
                return true;
            }).sort((a, b) => b.data.localeCompare(a.data));

            const transacoesPorMes = (() => {
                const grupos = {};
                transacoesFiltradas.forEach(t => {
                    const chave = (t.data || '0000-00').substring(0, 7);
                    if (!grupos[chave]) grupos[chave] = [];
                    grupos[chave].push(t);
                });
                return Object.keys(grupos).sort((a, b) => b.localeCompare(a)).map(chave => ({ chave, itens: grupos[chave] }));
            })();

            const mudarMes = (delta) => {
                let m = mesAtual + delta, a = anoAtual;
                if (m < 0) { m = 11; a--; } else if (m > 11) { m = 0; a++; }
                setMesAtual(m); setAnoAtual(a);
            };

            const dadosGrafico = (() => {
                const chaveMes = `${anoAtual}-${String(mesAtual + 1).padStart(2, '0')}`;
                const doMes = transacoes.filter(t => t.tipo === tipoGrafico && (t.data || '').substring(0, 7) === chaveMes);
                const porCat = {};
                doMes.forEach(t => { const c = t.categoria || 'Outros'; porCat[c] = (porCat[c] || 0) + t.valor; });
                const itens = Object.entries(porCat).map(([categoria, valor]) => ({ categoria, valor })).sort((a, b) => b.valor - a.valor);
                const total = itens.reduce((s, i) => s + i.valor, 0);
                let acum = 0;
                const segmentos = itens.map(it => {
                    const frac = total > 0 ? it.valor / total : 0;
                    const seg = { ...it, frac, start: acum * 360, end: (acum + frac) * 360, cor: corCategoria(it.categoria) };
                    acum += frac;
                    return seg;
                });
                return { total, segmentos };
            })();

            // ===== Gastos Extras (controle separado) =====
            const mudarMesExtra = (delta) => {
                let m = mesExtra + delta, a = anoExtra;
                if (m < 0) { m = 11; a--; } else if (m > 11) { m = 0; a++; }
                setMesExtra(m); setAnoExtra(a);
            };
            const chaveMesExtra = `${anoExtra}-${String(mesExtra + 1).padStart(2, '0')}`;
            const extrasMes = extras.filter(e => (e.data || '').substring(0, 7) === chaveMesExtra)
                .sort((a, b) => (b.data || '').localeCompare(a.data || ''));
            const ehReceitaExtra = (e) => e.tipo === 'receita';
            const despesasExtraMes = extrasMes.filter(e => !ehReceitaExtra(e));
            const receitasExtraMes = extrasMes.filter(e => ehReceitaExtra(e));
            const totalExtrasDespesa = despesasExtraMes.reduce((s, e) => s + (e.valor || 0), 0);
            const totalExtrasReceita = receitasExtraMes.reduce((s, e) => s + (e.valor || 0), 0);
            const totalExtrasCredito = despesasExtraMes.filter(e => e.forma === 'credito').reduce((s, e) => s + (e.valor || 0), 0);
            const totalExtrasDebito = totalExtrasDespesa - totalExtrasCredito;
            const dadosExtra = (() => {
                const porCat = {};
                despesasExtraMes.forEach(e => { const c = e.categoria || 'Outros'; porCat[c] = (porCat[c] || 0) + (e.valor || 0); });
                const itens = Object.entries(porCat).map(([categoria, valor]) => ({ categoria, valor })).sort((a, b) => b.valor - a.valor);
                const total = itens.reduce((s, i) => s + i.valor, 0);
                let acum = 0;
                const segmentos = itens.map(it => {
                    const frac = total > 0 ? it.valor / total : 0;
                    const seg = { ...it, frac, start: acum * 360, end: (acum + frac) * 360, cor: corCategoria(it.categoria) };
                    acum += frac;
                    return seg;
                });
                return { total, segmentos };
            })();

            const adicionarExtra = async () => {
                if (!formExtra.categoria || !formExtra.valor) return alert('Preencha a categoria e o valor');
                const valor = parseValor(formExtra.valor);
                if (isNaN(valor) || valor <= 0) return alert('Valor inválido');
                const tipo = formExtra.tipo === 'receita' ? 'receita' : 'despesa';
                const contaId = formExtra.contaId || null;
                // Se uma conta foi escolhida, o valor sai (despesa) ou entra (receita) nela
                if (contaId) {
                    const conta = contas.find(c => c.id === contaId);
                    if (conta) {
                        const delta = tipo === 'receita' ? valor : -valor;
                        await db.collection(prefixo() + 'contas').doc(contaId).update({ saldo: inc(delta) });
                    }
                }
                await db.collection(prefixo() + 'extras').add({
                    tipo,
                    categoria: formExtra.categoria.trim(),
                    descricao: (formExtra.descricao || '').trim(),
                    valor,
                    data: formExtra.data,
                    forma: tipo === 'despesa' ? (formExtra.forma === 'credito' ? 'credito' : 'debito') : null,
                    contaId,
                    criadoEm: new Date().toISOString()
                });
                setFormExtra({ tipo: 'despesa', categoria: '', descricao: '', valor: '', data: getDataHoje(), forma: 'debito', contaId: null });
            };

            const excluirExtra = async (id) => {
                const item = extras.find(e => e.id === id);
                if (!confirm('Excluir este lançamento extra?')) return;
                // Se afetou uma conta, devolve o efeito no saldo antes de excluir
                if (item && item.contaId) {
                    const conta = contas.find(c => c.id === item.contaId);
                    if (conta) {
                        const tipo = item.tipo === 'receita' ? 'receita' : 'despesa';
                        const delta = tipo === 'receita' ? -(item.valor || 0) : (item.valor || 0);
                        await db.collection(prefixo() + 'contas').doc(item.contaId).update({ saldo: inc(delta) });
                    }
                }
                await db.collection(prefixo() + 'extras').doc(id).delete();
            };

            const iniciarEdicaoExtra = (item) => {
                setEditandoExtra(item.id);
                setFormEdicaoExtra({
                    tipo: item.tipo === 'receita' ? 'receita' : 'despesa',
                    categoria: item.categoria || '',
                    valor: (item.valor != null ? item.valor : '').toString(),
                    descricao: item.descricao || '',
                    data: item.data || getDataHoje(),
                    forma: item.forma === 'credito' ? 'credito' : 'debito',
                    contaId: item.contaId || null
                });
            };

            const cancelarEdicaoExtra = () => {
                setEditandoExtra(null);
                setFormEdicaoExtra({});
            };

            const salvarEdicaoExtra = async (item) => {
                const f = formEdicaoExtra;
                if (!f.categoria || !f.valor) return alert('Preencha a categoria e o valor');
                const novoValor = parseValor(f.valor);
                if (isNaN(novoValor) || novoValor <= 0) return alert('Valor inválido');
                const novoTipo = f.tipo === 'receita' ? 'receita' : 'despesa';
                const novaConta = f.contaId || null;
                const oldTipo = item.tipo === 'receita' ? 'receita' : 'despesa';
                const oldConta = item.contaId || null;
                const oldValor = item.valor || 0;

                const batch = db.batch();
                // Desfaz o efeito antigo no saldo e aplica o novo (cobre mudança de valor, tipo e conta)
                const deltas = {};
                if (oldConta) {
                    const dOld = oldTipo === 'receita' ? -oldValor : oldValor;
                    deltas[oldConta] = (deltas[oldConta] || 0) + dOld;
                }
                if (novaConta) {
                    const dNew = novoTipo === 'receita' ? novoValor : -novoValor;
                    deltas[novaConta] = (deltas[novaConta] || 0) + dNew;
                }
                Object.entries(deltas).forEach(([cId, delta]) => {
                    const conta = contas.find(c => c.id === cId);
                    if (conta) batch.update(db.collection(prefixo() + 'contas').doc(cId), { saldo: inc(delta) });
                });
                batch.update(db.collection(prefixo() + 'extras').doc(item.id), {
                    tipo: novoTipo,
                    categoria: f.categoria.trim(),
                    descricao: (f.descricao || '').trim(),
                    valor: novoValor,
                    data: f.data,
                    forma: novoTipo === 'despesa' ? (f.forma === 'credito' ? 'credito' : 'debito') : null,
                    contaId: novaConta
                });
                await batch.commit();
                cancelarEdicaoExtra();
            };

            const adicionarCategoria = async () => {
                const nome = (novaCategoria || '').trim();
                if (!nome) return;
                if (categorias.some(c => c.toLowerCase() === nome.toLowerCase())) { alert('Essa categoria já existe.'); return; }
                await db.collection(prefixo() + 'categorias').add({ nome, criadoEm: new Date().toISOString() });
                setNovaCategoria('');
            };

            const removerCategoria = async (id) => {
                if (!confirm('Remover esta categoria? Os lançamentos antigos que já usam ela continuam como estão.')) return;
                await db.collection(prefixo() + 'categorias').doc(id).delete();
            };
            // Lembrete de contas a pagar (vence hoje / atrasadas)
            const hojeStr = getDataHoje();
            const venceHoje = transacoes.filter(t => t.tipo === 'despesa' && !t.pago && t.data === hojeStr);
            const vencidas = transacoes.filter(t => t.tipo === 'despesa' && !t.pago && (t.data || '') < hojeStr);
            const totalVenceHoje = venceHoje.reduce((s, t) => s + t.valor, 0);
            const totalVencidas = vencidas.reduce((s, t) => s + t.valor, 0);
            const aVencer = transacoes.filter(t => t.tipo === 'despesa' && !t.pago && (t.data || '') >= hojeStr).sort((a, b) => (a.data || '').localeCompare(b.data || ''));

            // Lembrete de backup (a cada 30 dias)
            const DIAS_BACKUP = 30;
            const diasDesdeBackup = ultimoBackup ? Math.floor((Date.now() - new Date(ultimoBackup).getTime()) / 86400000) : null;
            const backupAtrasado = transacoes.length > 0 && !backupDispensado && (!ultimoBackup || diasDesdeBackup >= DIAS_BACKUP);

            // Finanças: navegação mês a mês (igual ao dashboard)
            const mudarMesFin = (delta) => {
                let m = mesFin + delta, a = anoFin;
                if (m < 0) { m = 11; a--; } else if (m > 11) { m = 0; a++; }
                setMesFin(m); setAnoFin(a);
            };
            const buscandoOuFiltrando = busca.trim() !== '' || !!dataInicio || !!dataFim;
            const chaveMesFin = `${anoFin}-${String(mesFin + 1).padStart(2, '0')}`;
            const transacoesMesFin = transacoesFiltradas.filter(t => (t.data || '').substring(0, 7) === chaveMesFin);
            const receitasMesFinTotal = transacoesMesFin.filter(t => t.tipo === 'receita').reduce((s, t) => s + t.valor, 0);
            const despesasMesFinTotal = transacoesMesFin.filter(t => t.tipo === 'despesa').reduce((s, t) => s + t.valor, 0);

            const renderLinhaTransacao = (t) => (
                <div key={t.id} className={`p-3 rounded-xl border-2 ${t.pago ? (darkMode ? 'border-gray-600' : 'border-gray-200') : 'border-orange-300 bg-orange-50'}`}>
                    {editandoTransacao === t.id ? (
                        <div className="space-y-2">
                            <input type="text" placeholder="Descrição" value={formEdicao.descricao} onChange={(e) => setFormEdicao({...formEdicao, descricao: e.target.value})}
                                className={`w-full px-2 py-1 rounded border ${inputClass}`} />
                            <div className="grid grid-cols-2 gap-2">
                                <input type="text" inputMode="decimal" placeholder="Valor" value={formEdicao.valor} onChange={(e) => setFormEdicao({...formEdicao, valor: e.target.value})}
                                    className={`px-2 py-1 rounded border ${inputClass}`} />
                                <input type="date" value={formEdicao.data || ''} onChange={(e) => setFormEdicao({...formEdicao, data: e.target.value})}
                                    className={`px-2 py-1 rounded border ${inputClass}`} />
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setFormEdicao({...formEdicao, tipo: 'despesa'})}
                                    className={`flex-1 py-1 rounded text-sm font-bold border-2 ${formEdicao.tipo === 'despesa' ? 'bg-red-600 text-white border-red-600' : inputClass}`}>Despesa</button>
                                <button onClick={() => setFormEdicao({...formEdicao, tipo: 'receita'})}
                                    className={`flex-1 py-1 rounded text-sm font-bold border-2 ${formEdicao.tipo === 'receita' ? 'bg-green-600 text-white border-green-600' : inputClass}`}>Receita</button>
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <select value={formEdicao.categoria || 'Outros'} onChange={(e) => setFormEdicao({...formEdicao, categoria: e.target.value})}
                                    className={`px-2 py-1 rounded border ${inputClass}`}>
                                    {categorias.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <select value={formEdicao.contaId || ''} onChange={(e) => setFormEdicao({...formEdicao, contaId: e.target.value || null})}
                                    className={`px-2 py-1 rounded border ${inputClass}`}>
                                    <option value="">Sem conta</option>
                                    {contas.map(c => <option key={c.id} value={c.id}>{c.nome}</option>)}
                                </select>
                            </div>
                            {t.pago && (
                                <p className="text-xs text-gray-500">Este lançamento está pago — alterar valor, tipo ou conta ajusta o saldo automaticamente.</p>
                            )}
                            <div className="flex gap-2">
                                <button onClick={() => executar(() => salvarEdicao(t))} disabled={salvando} className="px-3 py-1 bg-green-600 text-white rounded text-sm disabled:opacity-60">Salvar</button>
                                <button onClick={() => setEditandoTransacao(null)} className="px-3 py-1 bg-gray-300 rounded text-sm">Cancelar</button>
                            </div>
                        </div>
                    ) : (
                        <div className="flex items-center gap-3">
                            <button onClick={() => executar(() => abrirModalBaixa(t))} disabled={salvando}>
                                <Icon name={t.pago ? 'check' : 'circle'} className={`w-6 h-6 ${t.pago ? 'text-green-600' : 'text-orange-500'}`} />
                            </button>
                            <div className="flex-1 min-w-0">
                                <p className={`font-medium truncate ${t.pago ? 'text-gray-500' : ''}`}>{t.descricao} {t.serieId && <span title="Repete em outros meses">🔁</span>}</p>
                                <p className="text-xs text-gray-500">{formatarData(t.data)} • {t.categoria}</p>
                            </div>
                            <span className={`font-bold whitespace-nowrap ${t.tipo === 'receita' ? 'text-green-600' : 'text-red-600'}`}>
                                {t.tipo === 'receita' ? '+' : '-'}{formatarMoeda(t.valor)}
                            </span>
                            <button onClick={() => iniciarEdicao(t)} className="p-1 text-blue-500"><Icon name="edit" className="w-4 h-4" /></button>
                            <button onClick={() => excluirTransacao(t.id)} className="p-1 text-red-500"><Icon name="trash" className="w-4 h-4" /></button>
                        </div>
                    )}
                </div>
            );

            // Funções CRUD
            const prefixo = () => `${usuarioAtual}_`;

            const adicionarTransacao = async () => {
                if (!formTransacao.descricao || !formTransacao.valor) return alert('Preencha descrição e valor');
                const valor = parseValor(formTransacao.valor);
                if (isNaN(valor)) return alert('Valor inválido');

                const repetir = formTransacao.repetir;
                const numMeses = repetir ? Math.max(2, parseInt(formTransacao.numMeses) || 2) : 1;
                const serieId = repetir ? (Date.now().toString(36) + Math.random().toString(36).slice(2, 8)) : null;

                const base = {
                    tipo: formTransacao.tipo,
                    descricao: formTransacao.descricao,
                    valor,
                    categoria: formTransacao.categoria || 'Outros',
                    contaId: formTransacao.contaId,
                };

                // Atualiza o saldo apenas da 1ª (se marcada como paga). As futuras entram como pendentes.
                if (formTransacao.pago && formTransacao.contaId) {
                    const conta = contas.find(c => c.id === formTransacao.contaId);
                    if (conta) {
                        const delta = formTransacao.tipo === 'receita' ? valor : -valor;
                        await db.collection(prefixo() + 'contas').doc(formTransacao.contaId).update({ saldo: inc(delta) });
                    }
                }

                const batch = db.batch();
                for (let i = 0; i < numMeses; i++) {
                    const ref = db.collection(prefixo() + 'transacoes').doc();
                    batch.set(ref, {
                        ...base,
                        data: i === 0 ? formTransacao.data : addMeses(formTransacao.data, i),
                        pago: i === 0 ? formTransacao.pago : false,
                        serieId,
                        criadoEm: new Date().toISOString()
                    });
                }
                await batch.commit();

                setFormTransacao({ tipo: 'despesa', descricao: '', valor: '', categoria: '', data: getDataHoje(), pago: false, contaId: formTransacao.contaId, repetir: false, numMeses: 12 });
            };

            const excluirTransacao = async (id) => {
                const t = transacoes.find(t => t.id === id);
                if (!t) return;
                if (!confirm('Excluir esta transação?')) return;

                let alvos = [t];
                // Se faz parte de uma série recorrente, oferece excluir também as futuras
                if (t.serieId) {
                    const futuras = transacoes.filter(x => x.serieId === t.serieId && x.data >= t.data && x.id !== t.id);
                    if (futuras.length > 0 && confirm(`Essa transação se repete em outros meses (${futuras.length} futura(s)).\n\nOK = excluir esta E as próximas\nCancelar = excluir só esta`)) {
                        alvos = alvos.concat(futuras);
                    }
                }

                // Reverte o saldo das que estavam pagas (somando por conta para não sobrescrever)
                const deltas = {};
                alvos.forEach(alvo => {
                    if (alvo.pago && alvo.contaId) {
                        const d = alvo.tipo === 'receita' ? -alvo.valor : alvo.valor;
                        deltas[alvo.contaId] = (deltas[alvo.contaId] || 0) + d;
                    }
                });

                const batch = db.batch();
                Object.entries(deltas).forEach(([cId, delta]) => {
                    const conta = contas.find(c => c.id === cId);
                    if (conta) batch.update(db.collection(prefixo() + 'contas').doc(cId), { saldo: inc(delta) });
                });
                alvos.forEach(alvo => batch.delete(db.collection(prefixo() + 'transacoes').doc(alvo.id)));
                await batch.commit();
            };

            const abrirModalBaixa = (t) => {
                if (t.pago) {
                    return confirmarBaixa(t, t.contaId, true);
                } else {
                    setDandoBaixa(t);
                    setContaBaixa(t.contaId || (contas.length > 0 ? contas[0].id : null));
                }
            };

            const confirmarBaixa = async (t, contaId, estaDesmarcando = false) => {
                const novoPago = !t.pago;
                
                if (contaId) {
                    const conta = contas.find(c => c.id === contaId);
                    if (conta) {
                        let delta;
                        if (novoPago) {
                            delta = t.tipo === 'receita' ? t.valor : -t.valor;
                        } else {
                            delta = t.tipo === 'receita' ? -t.valor : t.valor;
                        }
                        await db.collection(prefixo() + 'contas').doc(contaId).update({ saldo: inc(delta) });
                    }
                }
                
                await db.collection(prefixo() + 'transacoes').doc(t.id).update({ pago: novoPago, contaId: contaId || null });
                setDandoBaixa(null);
                setContaBaixa(null);
            };

            const iniciarEdicao = (t) => {
                setEditandoTransacao(t.id);
                setFormEdicao({ descricao: t.descricao, valor: t.valor.toString(), categoria: t.categoria, data: t.data, tipo: t.tipo, contaId: t.contaId });
            };

            const salvarEdicao = async (t) => {
                if (!formEdicao.descricao || !formEdicao.valor) return alert('Preencha descrição e valor');
                const novoValor = parseValor(formEdicao.valor);
                if (isNaN(novoValor) || novoValor < 0) return alert('Valor inválido');
                const novoTipo = formEdicao.tipo || t.tipo;
                const novaConta = formEdicao.contaId || null;

                const batch = db.batch();

                // Se a transação está paga, reverte o efeito antigo e aplica o novo no saldo.
                // Isso cobre mudança de valor, de tipo (receita/despesa) e de conta.
                if (t.pago) {
                    const deltas = {};
                    if (t.contaId) {
                        const dOld = t.tipo === 'receita' ? -t.valor : t.valor; // desfaz o efeito antigo
                        deltas[t.contaId] = (deltas[t.contaId] || 0) + dOld;
                    }
                    if (novaConta) {
                        const dNew = novoTipo === 'receita' ? novoValor : -novoValor; // aplica o novo efeito
                        deltas[novaConta] = (deltas[novaConta] || 0) + dNew;
                    }
                    Object.entries(deltas).forEach(([cId, delta]) => {
                        const conta = contas.find(c => c.id === cId);
                        if (conta) batch.update(db.collection(prefixo() + 'contas').doc(cId), { saldo: inc(delta) });
                    });
                }

                batch.update(db.collection(prefixo() + 'transacoes').doc(t.id), {
                    descricao: formEdicao.descricao,
                    valor: novoValor,
                    categoria: formEdicao.categoria || t.categoria || 'Outros',
                    data: formEdicao.data || t.data,
                    tipo: novoTipo,
                    contaId: novaConta
                });
                await batch.commit();
                setEditandoTransacao(null);
                setFormEdicao({});
            };

            // Contas
            const adicionarConta = async () => {
                if (!formConta.nome || !formConta.saldoInicial) return alert('Preencha os campos');
                await db.collection(prefixo() + 'contas').add({ nome: formConta.nome, saldo: parseValor(formConta.saldoInicial), tipo: formConta.tipo, criadoEm: new Date().toISOString() });
                setFormConta({ nome: '', saldoInicial: '', tipo: 'corrente' });
                setMostrarFormConta(false);
            };

            const excluirConta = async (id) => {
                if (confirm('Excluir esta conta?')) await db.collection(prefixo() + 'contas').doc(id).delete();
            };

            const editarSaldoConta = async (id, novoSaldo) => {
                await db.collection(prefixo() + 'contas').doc(id).update({ saldo: parseValor(novoSaldo) });
                setEditandoConta(null);
                setNovoSaldoConta('');
            };

            // Investimentos
            const adicionarInvestimento = async () => {
                if (!formInvestimento.descricao || !formInvestimento.valor) return alert('Preencha descrição e valor');
                if (!formInvestimento.contaId) return alert('Selecione uma conta');
                
                const valor = parseValor(formInvestimento.valor);
                const conta = contas.find(c => c.id === formInvestimento.contaId);
                
                if (conta) {
                    const delta = formInvestimento.tipo === 'aplicacao' ? -valor : valor;
                    await db.collection(prefixo() + 'contas').doc(formInvestimento.contaId).update({ saldo: inc(delta) });
                }
                
                await db.collection(prefixo() + 'investimentos').add({ ...formInvestimento, valor, criadoEm: new Date().toISOString() });
                setFormInvestimento({ tipo: 'aplicacao', descricao: '', valor: '', categoria: 'Renda Fixa', data: getDataHoje(), contaId: formInvestimento.contaId });
            };

            const excluirInvestimento = async (inv) => {
                if (!confirm('Excluir? O saldo será revertido.')) return;
                const conta = contas.find(c => c.id === inv.contaId);
                if (conta) {
                    const delta = inv.tipo === 'aplicacao' ? inv.valor : -inv.valor;
                    await db.collection(prefixo() + 'contas').doc(inv.contaId).update({ saldo: inc(delta) });
                }
                await db.collection(prefixo() + 'investimentos').doc(inv.id).delete();
            };

            const salvarValorAtualTipo = async (categoria, valorStr) => {
                const v = parseValor(valorStr);
                if (isNaN(v) || v < 0) return alert('Valor inválido');
                const slug = slugInv(categoria);
                await db.collection(prefixo() + 'investValores').doc(slug).set({ categoria, valorAtual: v, atualizadoEm: new Date().toISOString() }, { merge: true });
                setEditandoValorTipo(null);
                setValorTipoInput('');
            };

            // Parcelas
            const adicionarParcela = async () => {
                if (!formParcela.descricao || !formParcela.valorTotal || !formParcela.numParcelas || !formParcela.diaVencimento) {
                    return alert('Preencha todos os campos');
                }

                const valorTotal = parseValor(formParcela.valorTotal);
                const numParcelas = parseInt(formParcela.numParcelas);
                if (isNaN(valorTotal) || isNaN(numParcelas) || numParcelas < 1) return alert('Valores inválidos');
                const valorParcela = Math.round((valorTotal / numParcelas) * 100) / 100;
                const diaV = Math.min(31, Math.max(1, parseInt(formParcela.diaVencimento) || 1));

                if (formParcela.lancarFinancas) {
                    // Cria uma transação por mês na lista de Finanças (não cria entidade de parcela)
                    const serieId = Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
                    const hoje = new Date();
                    const diaClamp = (ano, mes) => Math.min(diaV, new Date(ano, mes + 1, 0).getDate());
                    let d = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
                    const dataDoMes = new Date(hoje.getFullYear(), hoje.getMonth(), diaClamp(hoje.getFullYear(), hoje.getMonth()));
                    if (dataDoMes < new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate())) {
                        d = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 1);
                    }
                    const batch = db.batch();
                    for (let i = 0; i < numParcelas; i++) {
                        const ano = d.getFullYear(), mes = d.getMonth();
                        const dia = diaClamp(ano, mes);
                        const dataStr = `${ano}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                        const ref = db.collection(prefixo() + 'transacoes').doc();
                        batch.set(ref, {
                            tipo: formParcela.tipo,
                            descricao: `${formParcela.descricao} (${i + 1}/${numParcelas})`,
                            valor: valorParcela,
                            categoria: formParcela.categoria || 'Outros',
                            data: dataStr,
                            pago: false,
                            contaId: formParcela.contaId,
                            serieId,
                            criadoEm: new Date().toISOString()
                        });
                        d = new Date(ano, mes + 1, 1);
                    }
                    await batch.commit();
                    // Também salva um registro de acompanhamento na aba Parcelas (ligado à série pelo serieId)
                    await db.collection(prefixo() + 'parcelas').add({
                        descricao: formParcela.descricao,
                        valorTotal,
                        numParcelas,
                        valorParcela,
                        parcelasPagas: 0,
                        diaVencimento: diaV,
                        categoria: formParcela.categoria || 'Outros',
                        contaId: formParcela.contaId,
                        tipo: formParcela.tipo,
                        serieId,
                        lancadoFinancas: true,
                        criadoEm: new Date().toISOString()
                    });
                } else {
                    // Cria a entidade de parcela (aba Parcelas), como antes
                    await db.collection(prefixo() + 'parcelas').add({
                        descricao: formParcela.descricao,
                        valorTotal,
                        numParcelas,
                        valorParcela,
                        parcelasPagas: 0,
                        diaVencimento: diaV,
                        categoria: formParcela.categoria || 'Outros',
                        contaId: formParcela.contaId,
                        criadoEm: new Date().toISOString()
                    });
                }

                setFormParcela({ descricao: '', valorTotal: '', numParcelas: '', diaVencimento: '', categoria: 'Outros', contaId: null, lancarFinancas: false, tipo: 'despesa' });
                setMostrarFormParcela(false);
            };

            const pagarParcela = async (p) => {
                if (p.parcelasPagas >= p.numParcelas) return alert('Todas as parcelas já foram pagas!');
                
                if (p.contaId) {
                    const conta = contas.find(c => c.id === p.contaId);
                    if (conta) {
                        await db.collection(prefixo() + 'contas').doc(p.contaId).update({ saldo: inc(-p.valorParcela) });
                    }
                }
                
                await db.collection(prefixo() + 'parcelas').doc(p.id).update({ parcelasPagas: p.parcelasPagas + 1 });
            };

            const desfazerPagamentoParcela = async (p) => {
                if (!p.parcelasPagas || p.parcelasPagas <= 0) return alert('Não há parcela paga para desfazer.');
                if (!confirm('Desfazer o pagamento da última parcela? O valor volta para a conta (se houver conta vinculada).')) return;

                if (p.contaId) {
                    const conta = contas.find(c => c.id === p.contaId);
                    if (conta) {
                        await db.collection(prefixo() + 'contas').doc(p.contaId).update({ saldo: inc(p.valorParcela) });
                    }
                }

                await db.collection(prefixo() + 'parcelas').doc(p.id).update({ parcelasPagas: p.parcelasPagas - 1 });
            };

            const excluirParcela = async (p) => {
                const parc = typeof p === 'string' ? parcelas.find(x => x.id === p) : p;
                if (!parc) return;

                if (parc.lancadoFinancas) {
                    if (!confirm('Excluir esta compra parcelada?')) return;
                    const ligadas = transacoes.filter(t => t.serieId === parc.serieId);
                    const tambemFinancas = ligadas.length > 0 && confirm(
                        `Esta parcela também tem ${ligadas.length} lançamento(s) na aba Finanças.\n\nOK = excluir a parcela E os lançamentos em Finanças\nCancelar = excluir só a parcela (mantém os lançamentos em Finanças)`
                    );
                    const batch = db.batch();
                    if (tambemFinancas) {
                        const deltas = {};
                        ligadas.forEach(t => {
                            if (t.pago && t.contaId) {
                                const d = t.tipo === 'receita' ? -t.valor : t.valor;
                                deltas[t.contaId] = (deltas[t.contaId] || 0) + d;
                            }
                        });
                        Object.entries(deltas).forEach(([cId, delta]) => {
                            const conta = contas.find(c => c.id === cId);
                            if (conta) batch.update(db.collection(prefixo() + 'contas').doc(cId), { saldo: inc(delta) });
                        });
                        ligadas.forEach(t => batch.delete(db.collection(prefixo() + 'transacoes').doc(t.id)));
                    }
                    batch.delete(db.collection(prefixo() + 'parcelas').doc(parc.id));
                    await batch.commit();
                } else {
                    if (confirm('Excluir esta compra parcelada?')) await db.collection(prefixo() + 'parcelas').doc(parc.id).delete();
                }
            };

            const iniciarEdicaoParcela = (p) => {
                setEditandoParcela(p.id);
                setFormEdicaoParcela({
                    descricao: p.descricao,
                    valorTotal: (p.valorTotal != null ? p.valorTotal : (p.valorParcela * p.numParcelas)).toString(),
                    numParcelas: p.numParcelas.toString(),
                    diaVencimento: (p.diaVencimento || 1).toString(),
                    categoria: p.categoria || 'Outros',
                    contaId: p.contaId || null
                });
                setMostrarFormParcela(false);
            };

            const cancelarEdicaoParcela = () => {
                setEditandoParcela(null);
                setFormEdicaoParcela({});
            };

            const salvarEdicaoParcela = async (p) => {
                const f = formEdicaoParcela;
                if (!f.descricao || !f.valorTotal || !f.numParcelas || !f.diaVencimento) {
                    return alert('Preencha descrição, valor total, nº de parcelas e dia de vencimento.');
                }
                const valorTotal = parseValor(f.valorTotal);
                const numParcelas = parseInt(f.numParcelas);
                if (isNaN(valorTotal) || isNaN(numParcelas) || numParcelas < 1) return alert('Valores inválidos.');
                const diaV = Math.min(31, Math.max(1, parseInt(f.diaVencimento) || 1));
                const categoria = f.categoria || 'Outros';
                const contaId = f.contaId || null;
                const valorParcela = Math.round((valorTotal / numParcelas) * 100) / 100;

                if (p.lancadoFinancas) {
                    // Parcela ligada ao Finanças: nº de parcelas travado (somar/remover lançamentos é arriscado)
                    if (numParcelas !== p.numParcelas) {
                        return alert('Esta parcela foi lançada em Finanças, então o nº de parcelas não muda por aqui. Para alterar a quantidade, exclua e crie de novo.');
                    }
                    const ligadas = transacoes
                        .filter(t => t.serieId === p.serieId)
                        .sort((a, b) => (a.data || '').localeCompare(b.data || ''));
                    const batch = db.batch();
                    const deltas = {};
                    ligadas.forEach((t, idx) => {
                        const partes = (t.data || '').split('-');
                        const ano = parseInt(partes[0]); const mes = parseInt(partes[1]) - 1;
                        const ultimoDia = new Date(ano, mes + 1, 0).getDate();
                        const dia = Math.min(diaV, ultimoDia);
                        const novaData = `${ano}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                        // Ajusta o saldo das parcelas já pagas, se o valor mudou
                        if (t.pago && t.contaId && valorParcela !== t.valor) {
                            const dif = valorParcela - t.valor;
                            const d = t.tipo === 'receita' ? dif : -dif;
                            deltas[t.contaId] = (deltas[t.contaId] || 0) + d;
                        }
                        batch.update(db.collection(prefixo() + 'transacoes').doc(t.id), {
                            descricao: `${f.descricao} (${idx + 1}/${numParcelas})`,
                            valor: valorParcela,
                            categoria,
                            data: novaData
                        });
                    });
                    Object.entries(deltas).forEach(([cId, delta]) => {
                        const conta = contas.find(c => c.id === cId);
                        if (conta) batch.update(db.collection(prefixo() + 'contas').doc(cId), { saldo: inc(delta) });
                    });
                    batch.update(db.collection(prefixo() + 'parcelas').doc(p.id), {
                        descricao: f.descricao, valorTotal, numParcelas, valorParcela, diaVencimento: diaV, categoria, contaId
                    });
                    await batch.commit();
                } else {
                    // Parcela normal (contador na aba Parcelas) — não mexe em saldo já lançado
                    const parcelasPagas = Math.min(p.parcelasPagas || 0, numParcelas);
                    await db.collection(prefixo() + 'parcelas').doc(p.id).update({
                        descricao: f.descricao, valorTotal, numParcelas, valorParcela, diaVencimento: diaV, categoria, contaId, parcelasPagas
                    });
                }
                cancelarEdicaoParcela();
            };

            // Auth functions (Firebase Authentication)
            const fazerLogin = async () => {
                setErroLogin(''); setMsgReset('');
                if (!senhaDigitada) { setErroLogin('Digite sua senha.'); return; }
                setCarregandoLogin(true);
                try {
                    await auth.signInWithEmailAndPassword(EMAIL_LOGIN, senhaDigitada);
                    // onAuthStateChanged cuida de marcar como autenticado
                } catch (e) {
                    if (e.code === 'auth/invalid-email') {
                        setErroLogin('Configure o EMAIL_LOGIN no código antes de entrar.');
                    } else if (e.code === 'auth/network-request-failed') {
                        setErroLogin('Sem conexão. Verifique sua internet.');
                    } else if (e.code === 'auth/too-many-requests') {
                        setErroLogin('Muitas tentativas. Aguarde um momento e tente de novo.');
                    } else {
                        setErroLogin('Senha incorreta ou conta ainda não criada no Firebase.');
                    }
                } finally {
                    setCarregandoLogin(false);
                }
            };

            const esqueciSenha = async () => {
                setErroLogin(''); setMsgReset('');
                try {
                    await auth.sendPasswordResetEmail(EMAIL_LOGIN);
                    setMsgReset(`Enviei um link de redefinição para ${EMAIL_LOGIN}. Veja a caixa de entrada (e o spam).`);
                } catch (e) {
                    if (e.code === 'auth/invalid-email') setErroLogin('O e-mail configurado no app (EMAIL_LOGIN) é inválido.');
                    else if (e.code === 'auth/user-not-found') setErroLogin('Não há conta com esse e-mail no Firebase.');
                    else if (e.code === 'auth/network-request-failed') setErroLogin('Sem conexão. Verifique sua internet.');
                    else setErroLogin('Não foi possível enviar o link agora. Tente novamente mais tarde.');
                }
            };

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(user => {
                    if (user) {
                        setAutenticado(true);
                        setUsuarioAtual('victor');
                    } else {
                        setAutenticado(false);
                        setUsuarioAtual(null);
                    }
                    setVerificandoAuth(false);
                });
                return () => unsub();
            }, []);

            // Captura o convite de instalação do navegador (Android/Chrome)
            useEffect(() => {
                const aoPoderInstalar = (e) => { e.preventDefault(); setPromptInstalar(e); };
                const aoInstalar = () => setPromptInstalar(null);
                window.addEventListener('beforeinstallprompt', aoPoderInstalar);
                window.addEventListener('appinstalled', aoInstalar);
                return () => {
                    window.removeEventListener('beforeinstallprompt', aoPoderInstalar);
                    window.removeEventListener('appinstalled', aoInstalar);
                };
            }, []);

            // Abre o lembrete automaticamente 1x por dia, se houver algo a pagar
            useEffect(() => {
                if (!autenticado) return;
                if (venceHoje.length === 0 && vencidas.length === 0) return;
                const hoje = getDataHoje();
                if (localStorage.getItem('fin-lembrete-dia') !== hoje) {
                    setMostrarLembrete(true);
                    localStorage.setItem('fin-lembrete-dia', hoje);
                }
            }, [autenticado, transacoes]);

            const instalarApp = async () => {
                if (!promptInstalar) return;
                promptInstalar.prompt();
                await promptInstalar.userChoice;
                setPromptInstalar(null);
            };

            // Aplica a cor de destaque escolhida em todo o app
            useEffect(() => {
                document.documentElement.style.setProperty('--cor-primaria', corPrimaria);
                document.documentElement.style.setProperty('--cor-primaria-hover', escurecer(corPrimaria, 18));
                localStorage.setItem('fin-cor', corPrimaria);
            }, [corPrimaria]);

            // Salva a preferência de tema (claro/escuro)
            useEffect(() => {
                localStorage.setItem('fin-dark', darkMode ? '1' : '0');
            }, [darkMode]);

            // Aplica o papel de parede no fundo da página
            useEffect(() => {
                if (papelParede) {
                    document.body.style.backgroundImage = `url("${papelParede}")`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundAttachment = 'fixed';
                } else {
                    document.body.style.backgroundImage = '';
                }
            }, [papelParede]);

            // Avisos rápidos (toasts)
            const avisoTimerRef = useRef(null);
            const mostrarAviso = (mensagem, tipo = 'info', duracao = 4000) => {
                setAviso({ mensagem, tipo });
                if (avisoTimerRef.current) clearTimeout(avisoTimerRef.current);
                avisoTimerRef.current = setTimeout(() => setAviso(null), duracao);
            };

            // Estado da conexão (online/offline)
            useEffect(() => {
                const ficouOnline = () => { setOnline(true); mostrarAviso('Conexão restabelecida. Sincronizando…', 'ok'); };
                const ficouOffline = () => { setOnline(false); mostrarAviso('Você está offline. Suas alterações serão salvas e sincronizadas quando a internet voltar.', 'info', 6000); };
                window.addEventListener('online', ficouOnline);
                window.addEventListener('offline', ficouOffline);
                return () => {
                    window.removeEventListener('online', ficouOnline);
                    window.removeEventListener('offline', ficouOffline);
                };
            }, []);

            // Avisa quando uma gravação realmente falha (em vez de falhar em silêncio)
            useEffect(() => {
                const aoErro = (event) => {
                    const e = event.reason;
                    if (e && (e.code || e.name === 'FirebaseError')) {
                        if (e.code === 'permission-denied') {
                            mostrarAviso('Sem permissão para salvar. Confira se você ainda está logado.', 'erro', 7000);
                        } else if (e.code === 'unavailable' || e.code === 'failed-precondition') {
                            mostrarAviso('Sem conexão para salvar agora. Vai tentar de novo automaticamente.', 'info', 7000);
                        } else {
                            mostrarAviso('Não foi possível salvar: ' + (e.message || e.code), 'erro', 7000);
                        }
                    }
                };
                window.addEventListener('unhandledrejection', aoErro);
                return () => window.removeEventListener('unhandledrejection', aoErro);
            }, []);

            // Papel de parede: envia uma foto, comprime e guarda (pra não pesar)
            const aoEscolherPapel = (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const max = 1280;
                        let { width, height } = img;
                        if (width > max || height > max) {
                            const r = Math.min(max / width, max / height);
                            width = Math.round(width * r);
                            height = Math.round(height * r);
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        try {
                            localStorage.setItem('fin-papel', dataUrl);
                            setPapelParede(dataUrl);
                        } catch (err) {
                            alert('A imagem ficou grande demais para salvar. Tente uma foto menor.');
                        }
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const removerPapel = () => {
                localStorage.removeItem('fin-papel');
                setPapelParede('');
            };

            const restaurarPadrao = () => {
                setCorPrimaria('#7c3aed');
                removerPapel();
            };

            // Backup / Exportar / Restaurar
            const baixarArquivo = (conteudo, nomeArquivo, tipo) => {
                const blob = new Blob([conteudo], { type: tipo });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = nomeArquivo;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            };

            const exportarJSON = () => {
                const dados = { versao: 4, exportadoEm: new Date().toISOString(), transacoes, contas, parcelas, investimentos, extras, categorias: categoriasCustomDocs, investValores: valoresInvDocs };
                baixarArquivo(JSON.stringify(dados, null, 2), `financeiro-backup-${getDataHoje()}.json`, 'application/json');
                const hoje = getDataHoje();
                localStorage.setItem('fin-ultimo-backup', hoje);
                setUltimoBackup(hoje);
                setBackupDispensado(false);
            };

            const exportarCSV = () => {
                const nomeConta = (id) => { const c = contas.find(c => c.id === id); return c ? c.nome : ''; };
                const esc = (v) => {
                    const s = String(v == null ? '' : v);
                    return /[";\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
                };
                const cabecalho = ['Data', 'Tipo', 'Descrição', 'Categoria', 'Valor', 'Pago', 'Conta'];
                const linhas = transacoes.slice().sort((a, b) => (a.data || '').localeCompare(b.data || '')).map(t =>
                    [t.data, t.tipo, t.descricao, t.categoria, String(t.valor).replace('.', ','), t.pago ? 'Sim' : 'Não', nomeConta(t.contaId)].map(esc).join(';')
                );
                const csv = '\uFEFF' + [cabecalho.join(';'), ...linhas].join('\n');
                baixarArquivo(csv, `financeiro-transacoes-${getDataHoje()}.csv`, 'text/csv;charset=utf-8');
            };

            const exportarExcel = () => {
                if (typeof XLSX === 'undefined') {
                    alert('A planilha do Excel precisa de internet para carregar na primeira vez. Conecte-se e tente de novo.');
                    return;
                }
                const nomeConta = (id) => { const c = contas.find(c => c.id === id); return c ? c.nome : ''; };
                const wb = XLSX.utils.book_new();
                const addAba = (nome, linhas) => {
                    const ws = XLSX.utils.json_to_sheet(linhas.length ? linhas : [{}]);
                    XLSX.utils.book_append_sheet(wb, ws, nome);
                };
                addAba('Transacoes', transacoes.slice().sort((a, b) => (a.data || '').localeCompare(b.data || '')).map(t => ({
                    Data: t.data || '', Tipo: t.tipo, 'Descrição': t.descricao, Categoria: t.categoria,
                    Valor: t.valor, Pago: t.pago ? 'Sim' : 'Não', Conta: nomeConta(t.contaId)
                })));
                addAba('Contas', contas.map(c => ({ Nome: c.nome, Tipo: c.tipo, Saldo: c.saldo })));
                addAba('Parcelas', parcelas.map(p => ({
                    'Descrição': p.descricao, 'Valor total': p.valorTotal, 'Nº parcelas': p.numParcelas,
                    'Valor da parcela': p.valorParcela, 'Pagas': parcelasPagasDe(p), 'Dia venc.': p.diaVencimento,
                    Categoria: p.categoria, Conta: nomeConta(p.contaId), 'Em Finanças': p.lancadoFinancas ? 'Sim' : 'Não'
                })));
                addAba('Investimentos', investimentos.slice().sort((a, b) => (a.data || '').localeCompare(b.data || '')).map(i => ({
                    Data: i.data || '', Tipo: i.tipo, 'Descrição': i.descricao, Categoria: i.categoria,
                    Valor: i.valor, Conta: nomeConta(i.contaId)
                })));
                addAba('Extras', extras.slice().sort((a, b) => (a.data || '').localeCompare(b.data || '')).map(e => ({
                    Data: e.data || '', Tipo: e.tipo === 'receita' ? 'Receita' : 'Despesa', Categoria: e.categoria, 'Descrição': e.descricao || '',
                    Valor: e.valor, Forma: e.tipo === 'receita' ? '' : (e.forma === 'credito' ? 'Crédito' : 'Débito'), Conta: nomeConta(e.contaId)
                })));
                addAba('Rendimento', investPorTipo.map(t => ({
                    Tipo: t.categoria, Investido: t.investido,
                    'Valor atual': t.valorAtual != null ? t.valorAtual : '',
                    Rendimento: t.rendimento != null ? t.rendimento : '',
                    'Rendimento %': t.rendPct != null ? Number(t.rendPct.toFixed(2)) : ''
                })));
                XLSX.writeFile(wb, `financeiro-completo-${getDataHoje()}.xlsx`);
                const hoje = getDataHoje();
                localStorage.setItem('fin-ultimo-backup', hoje);
                setUltimoBackup(hoje);
                setBackupDispensado(false);
            };

            const importarJSON = (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    let dados;
                    try { dados = JSON.parse(ev.target.result); } catch (err) { alert('Arquivo inválido.'); return; }
                    if (!dados || (!dados.transacoes && !dados.contas && !dados.parcelas && !dados.investimentos && !dados.extras && !dados.categorias && !dados.investValores)) {
                        alert('Este arquivo não parece um backup do Financeiro.');
                        return;
                    }
                    const total = (dados.transacoes?.length || 0) + (dados.contas?.length || 0) + (dados.parcelas?.length || 0) + (dados.investimentos?.length || 0) + (dados.extras?.length || 0) + (dados.categorias?.length || 0) + (dados.investValores?.length || 0);
                    if (!confirm(`Restaurar este backup? Ele tem ${total} item(ns).\n\nOs itens do backup serão gravados (itens com o mesmo identificador são sobrescritos). Isto NÃO apaga lançamentos criados depois.`)) return;
                    try {
                        const restaurar = async (nome, lista) => {
                            if (!Array.isArray(lista)) return;
                            for (let i = 0; i < lista.length; i += 400) {
                                const batch = db.batch();
                                lista.slice(i, i + 400).forEach(item => {
                                    const { id, ...resto } = item;
                                    const ref = id ? db.collection(prefixo() + nome).doc(id) : db.collection(prefixo() + nome).doc();
                                    batch.set(ref, resto);
                                });
                                await batch.commit();
                            }
                        };
                        await restaurar('transacoes', dados.transacoes);
                        await restaurar('contas', dados.contas);
                        await restaurar('parcelas', dados.parcelas);
                        await restaurar('investimentos', dados.investimentos);
                        await restaurar('extras', dados.extras);
                        await restaurar('categorias', dados.categorias);
                        await restaurar('investValores', dados.investValores);
                        alert('✅ Backup restaurado com sucesso!');
                        setMostrarBackup(false);
                    } catch (err) {
                        alert('Erro ao restaurar: ' + (err.message || err));
                    }
                };
                reader.readAsText(file);
            };

            const abrirAddRapido = () => {

            const adicionarRapido = async () => {
                if (!formRapido.descricao || !formRapido.valor) return alert('Preencha descrição e valor');
                const valor = parseValor(formRapido.valor);
                if (isNaN(valor)) return alert('Valor inválido');

                if (formRapido.pago && formRapido.contaId) {
                    const conta = contas.find(c => c.id === formRapido.contaId);
                    if (conta) {
                        const delta = formRapido.tipo === 'receita' ? valor : -valor;
                        await db.collection(prefixo() + 'contas').doc(formRapido.contaId).update({ saldo: inc(delta) });
                    }
                }

                await db.collection(prefixo() + 'transacoes').add({
                    tipo: formRapido.tipo,
                    descricao: formRapido.descricao,
                    valor,
                    categoria: formRapido.categoria || 'Outros',
                    data: formRapido.data,
                    pago: formRapido.pago,
                    contaId: formRapido.contaId,

                    criadoEm: new Date().toISOString()

                setMostrarAddRapido(false);
            };

                try {
