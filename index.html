                    await auth.currentUser.reauthenticateWithCredential(cred);
                    await auth.currentUser.updatePassword(novaSenha);
                    setMostrarTrocarSenha(false);
                    setSenhaAtual('');
                    setNovaSenha('');
                    setConfirmarSenha('');
                    alert('✅ Senha alterada com sucesso!');

                                <p className="text-lg font-bold">{formatarMoeda(aPagarMesReal)}</p>

                        {/* Menu lateral (abas) */}
                        {menuAberto && <div onClick={() => setMenuAberto(false)} className="fixed inset-0 bg-black bg-opacity-50 z-40"></div>}
                        <div className={`fixed top-0 left-0 h-full w-64 ${cardClass} shadow-2xl z-50 transform transition-transform duration-300 ${menuAberto ? 'translate-x-0' : '-translate-x-full'}`}>
                            <div className={`p-4 flex items-center justify-between border-b ${darkMode ? 'border-gray-700' : 'border-gray-200'}`}>
                                <span className="font-bold text-lg">💰 Menu</span>
                                <button onClick={() => setMenuAberto(false)}><Icon name="x" /></button>
                            </div>

                        {/* Conteúdo das Abas */}

                                    <div className="space-y-2">
                                        <h3 className="font-bold">Lançamentos de {mesesNomes[mesExtra]}</h3>
                                        {extrasMes.map(e => (
                                            editandoExtra === e.id ? (
                                                <div key={e.id} className={`p-3 rounded-xl border-2 border-purple-400 ${darkMode ? 'bg-gray-700' : 'bg-purple-50'}`}>
                                                    <div className="flex gap-2 mb-2">
                                                        <button onClick={() => setFormEdicaoExtra({...formEdicaoExtra, tipo: 'despesa'})}
                                                            className={`flex-1 py-2 rounded-lg text-sm font-bold border-2 ${formEdicaoExtra.tipo !== 'receita' ? 'bg-red-600 text-white border-red-600' : inputClass}`}>Despesa</button>
                                                        <button onClick={() => setFormEdicaoExtra({...formEdicaoExtra, tipo: 'receita'})}
                                                            className={`flex-1 py-2 rounded-lg text-sm font-bold border-2 ${formEdicaoExtra.tipo === 'receita' ? 'bg-green-600 text-white border-green-600' : inputClass}`}>Receita</button>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-2">
                                                        <input type="text" list="cats-extra" placeholder="Categoria" value={formEdicaoExtra.categoria}
                                                            onChange={(ev) => setFormEdicaoExtra({...formEdicaoExtra, categoria: ev.target.value})}
                                                            className={`px-3 py-2 rounded-lg border-2 ${inputClass}`} />
                                                        <input type="text" inputMode="decimal" placeholder="Valor" value={formEdicaoExtra.valor}
                                                            onChange={(ev) => setFormEdicaoExtra({...formEdicaoExtra, valor: ev.target.value})}
                                                            className={`px-3 py-2 rounded-lg border-2 ${inputClass}`} />
                                                        <input type="text" placeholder="Descrição (opcional)" value={formEdicaoExtra.descricao}
                                                            onChange={(ev) => setFormEdicaoExtra({...formEdicaoExtra, descricao: ev.target.value})}
                                                            className={`px-3 py-2 rounded-lg border-2 ${inputClass}`} />
                                                        <input type="date" value={formEdicaoExtra.data || ''}
                                                            onChange={(ev) => setFormEdicaoExtra({...formEdicaoExtra, data: ev.target.value})}
                                                            className={`px-3 py-2 rounded-lg border-2 ${inputClass}`} />
                                                    </div>
                                                    <div className="mt-2">
                                                        <p className="text-xs text-gray-500 mb-1">Conta {formEdicaoExtra.contaId ? (formEdicaoExtra.tipo === 'receita' ? '(o valor entra nela)' : '(o valor sai dela)') : '(opcional)'}</p>
                                                        <select value={formEdicaoExtra.contaId || ''} onChange={(ev) => setFormEdicaoExtra({...formEdicaoExtra, contaId: ev.target.value || null})}
                                                            className={`w-full px-3 py-2 rounded-lg border-2 ${inputClass}`}>
                                                            <option value="">Sem conta (só anotar)</option>
                                                            {contas.map(c => <option key={c.id} value={c.id}>{c.nome}</option>)}
                                                        </select>
                                                    </div>
                                                    {formEdicaoExtra.tipo !== 'receita' && (
                                                        <div className="flex gap-2 mt-2">
                                                            <button onClick={() => setFormEdicaoExtra({...formEdicaoExtra, forma: 'debito'})}
                                                                className={`flex-1 py-2 rounded-lg text-sm font-bold border-2 ${formEdicaoExtra.forma !== 'credito' ? 'bg-blue-600 text-white border-blue-600' : inputClass}`}>🏧 Débito</button>
                                                            <button onClick={() => setFormEdicaoExtra({...formEdicaoExtra, forma: 'credito'})}
                                                                className={`flex-1 py-2 rounded-lg text-sm font-bold border-2 ${formEdicaoExtra.forma === 'credito' ? 'bg-purple-600 text-white border-purple-600' : inputClass}`}>💳 Crédito</button>
                                                        </div>
                                                    )}
                                                    <div className="flex gap-2 mt-3">
                                                        <button onClick={cancelarEdicaoExtra} className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg">Cancelar</button>
                                                        <button onClick={() => executar(() => salvarEdicaoExtra(e))} disabled={salvando} className="px-4 py-2 bg-purple-600 text-white rounded-lg disabled:opacity-60">Salvar</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div key={e.id} className={`p-3 rounded-xl border-2 ${darkMode ? 'border-gray-600' : 'border-gray-200'} flex items-center gap-3`}>
                                                    <span className="w-3 h-3 rounded-full flex-shrink-0" style={{backgroundColor: corCategoria(e.categoria)}}></span>
                                                    <div className="flex-1 min-w-0">
                                                        <p className="font-medium truncate">{e.categoria}{e.descricao ? ` — ${e.descricao}` : ''}</p>
                                                        <p className="text-xs text-gray-500">{formatarData(e.data)} • {e.tipo === 'receita' ? '💰 Receita' : (e.forma === 'credito' ? '💳 Crédito' : '🏧 Débito')}{e.contaId && contas.find(c => c.id === e.contaId) ? ` • ${contas.find(c => c.id === e.contaId).nome}` : ''}</p>
                                                    </div>
                                                    <span className={`font-bold whitespace-nowrap ${e.tipo === 'receita' ? 'text-green-600' : 'text-red-600'}`}>{e.tipo === 'receita' ? '+' : '-'}{formatarMoeda(e.valor)}</span>
                                                    <button onClick={() => iniciarEdicaoExtra(e)} className="p-1 text-blue-500"><Icon name="edit" className="w-4 h-4" /></button>
                                                    <button onClick={() => excluirExtra(e.id)} className="p-1 text-red-500"><Icon name="trash" className="w-4 h-4" /></button>
                                                </div>
                                            )
                                        ))}
                                        {extrasMes.length === 0 && <p className="text-center text-gray-500 py-8">Nada anotado em {mesesNomes[mesExtra]}.</p>}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Modal Dar Baixa */}
                        {dandoBaixa && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                <div className={`${cardClass} rounded-2xl p-6 w-full max-w-sm shadow-2xl`}>
                                    <h3 className="text-lg font-bold mb-4">💵 Dar Baixa</h3>
                                    <p className="mb-2"><strong>{dandoBaixa.descricao}</strong></p>
                                    <p className="text-2xl font-bold text-red-600 mb-4">{formatarMoeda(dandoBaixa.valor)}</p>
                                    
                                    <label className="text-sm text-gray-600">Débitar da conta:</label>
                                    <select value={contaBaixa || ''} onChange={(e) => setContaBaixa(e.target.value || null)}
                                        className={`w-full px-3 py-2 rounded-lg border-2 mb-4 ${inputClass}`}>
                                        <option value="">Nenhuma (só marcar como pago)</option>
                                        {contas.map(c => <option key={c.id} value={c.id}>{c.nome} ({formatarMoeda(c.saldo)})</option>)}
                                    </select>
                                    
                                    <div className="flex gap-2">
                                        <button onClick={() => setDandoBaixa(null)} className="flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg">Cancelar</button>
                                        <button onClick={() => executar(() => confirmarBaixa(dandoBaixa, contaBaixa))} disabled={salvando} className="flex-1 py-2 bg-green-600 text-white rounded-lg disabled:opacity-60">Confirmar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Botão flutuante: adicionar rápido (discreto; some durante uma edição) */}
                        {!(editandoTransacao || editandoParcela || editandoExtra) && (
                            <button onClick={abrirAddRapido}
                                className="fixed bottom-5 right-5 z-30 w-11 h-11 rounded-full bg-purple-600 text-white shadow-lg flex items-center justify-center opacity-50 hover:opacity-100 active:opacity-100 hover:bg-purple-700 active:scale-95 transition-all"
                                title="Adicionar rápido" aria-label="Adicionar rápido">
                                <Icon name="plus" className="w-5 h-5" />
                            </button>
                        )}

                        {/* Modal: adicionar rápido */}
                        {mostrarAddRapido && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-end sm:items-center justify-center z-50 p-4">
                                <div className={`${cardClass} rounded-2xl p-5 w-full max-w-sm shadow-2xl`}>
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-lg font-bold">⚡ Adicionar rápido</h3>
                                        <button onClick={() => setMostrarAddRapido(false)}><Icon name="x" /></button>
                                    </div>

                                    <div className="space-y-3">
                                        <div className="flex gap-2">
                                            <button onClick={() => setFormRapido({...formRapido, tipo: 'despesa'})}
                                                className={`flex-1 py-2 rounded-lg text-sm font-bold border-2 ${formRapido.tipo === 'despesa' ? 'bg-red-600 text-white border-red-600' : inputClass}`}>Despesa</button>
                                            <button onClick={() => setFormRapido({...formRapido, tipo: 'receita'})}
                                                className={`flex-1 py-2 rounded-lg text-sm font-bold border-2 ${formRapido.tipo === 'receita' ? 'bg-green-600 text-white border-green-600' : inputClass}`}>Receita</button>
                                        </div>

                                        <input type="text" inputMode="decimal" placeholder="Valor (R$)" value={formRapido.valor} autoFocus
                                            onChange={(e) => setFormRapido({...formRapido, valor: e.target.value})}
                                            onKeyPress={(e) => e.key === 'Enter' && executar(adicionarRapido)}
                                            className={`w-full px-3 py-3 text-lg rounded-lg border-2 ${inputClass}`} />

                                        <input type="text" placeholder="Descrição" value={formRapido.descricao}
                                            onChange={(e) => setFormRapido({...formRapido, descricao: e.target.value})}
                                            onKeyPress={(e) => e.key === 'Enter' && executar(adicionarRapido)}
                                            className={`w-full px-3 py-2 rounded-lg border-2 ${inputClass}`} />

                                        <select value={formRapido.categoria} onChange={(e) => setFormRapido({...formRapido, categoria: e.target.value})}
                                            className={`w-full px-3 py-2 rounded-lg border-2 ${inputClass}`}>
                                            <option value="">Categoria (Outros)</option>
                                            {categorias.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>

                                        <div className="grid grid-cols-2 gap-2">
                                            <input type="date" value={formRapido.data}
                                                onChange={(e) => setFormRapido({...formRapido, data: e.target.value})}
                                                className={`px-3 py-2 rounded-lg border-2 ${inputClass}`} />
                                            <select value={formRapido.contaId || ''} onChange={(e) => setFormRapido({...formRapido, contaId: e.target.value || null})}
                                                className={`px-3 py-2 rounded-lg border-2 ${inputClass}`}>
                                                <option value="">Conta (opcional)</option>
                                                {contas.map(c => <option key={c.id} value={c.id}>{c.nome}</option>)}
                                            </select>
                                        </div>

                                        <label className={`flex items-center gap-2 px-3 py-2 rounded-lg border-2 ${inputClass}`}>
                                            <input type="checkbox" checked={formRapido.pago} onChange={(e) => setFormRapido({...formRapido, pago: e.target.checked})} />
                                            Já está pago
                                        </label>

                                        <div className="flex gap-2 pt-1">
                                            <button onClick={() => setMostrarAddRapido(false)} className="flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg">Cancelar</button>
                                            <button onClick={() => executar(adicionarRapido)} disabled={salvando} className="flex-1 py-2 bg-purple-600 text-white rounded-lg font-bold disabled:opacity-60">Adicionar</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Aviso (toast) */}
                        {aviso && (
                            <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[60] px-4 py-3 rounded-xl shadow-2xl text-sm font-medium text-white max-w-xs text-center"
                                style={{ backgroundColor: aviso.tipo === 'erro' ? '#dc2626' : aviso.tipo === 'ok' ? '#16a34a' : '#334155' }}>
                                {aviso.mensagem}
                            </div>
                        )}

                        {/* Modal: backup / exportar */}
                        {mostrarBackup && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                <div className={`${cardClass} rounded-2xl p-5 w-full max-w-sm shadow-2xl max-h-[85vh] overflow-y-auto`}>
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-lg font-bold">💾 Backup / Exportar</h3>
                                        <button onClick={() => setMostrarBackup(false)}><Icon name="x" /></button>
                                    </div>

                                    <p className="text-sm font-bold mb-2">Salvar uma cópia</p>
                                    <button onClick={exportarJSON} className="w-full mb-2 py-3 bg-purple-600 text-white rounded-lg font-medium text-left px-4">
                                        🗂️ Backup completo (.json)
                                        <span className="block text-xs font-normal opacity-80">Tudo (transações, contas, parcelas, investimentos, extras e categorias). É este que restaura o app — guarde num lugar seguro.</span>
                                    </button>
                                    <button onClick={exportarExcel} className="w-full mb-2 py-3 bg-emerald-600 text-white rounded-lg font-medium text-left px-4">
                                        📗 Planilha Excel completa (.xlsx)
                                        <span className="block text-xs font-normal opacity-80">Tudo em abas separadas, para abrir no Excel/Planilhas e guardar. (Não restaura no app — para isso use o .json.)</span>
                                    </button>
                                    <button onClick={exportarCSV} className="w-full mb-4 py-3 bg-green-600 text-white rounded-lg font-medium text-left px-4">
                                        📊 Transações (.csv para Excel)
                                        <span className="block text-xs font-normal opacity-80">Abre no Excel/Planilhas para você analisar.</span>
                                    </button>

                                    <div className={`my-2 border-t ${darkMode ? 'border-gray-700' : 'border-gray-200'}`}></div>

                                    <p className="text-sm font-bold mb-2">Restaurar</p>
                                    <label className="w-full block py-3 bg-blue-600 text-white rounded-lg font-medium text-left px-4 cursor-pointer">
                                        ♻️ Restaurar de um backup (.json)
                                        <span className="block text-xs font-normal opacity-80">Carrega um arquivo de backup. Itens iguais são sobrescritos; nada é apagado.</span>
                                        <input type="file" accept="application/json,.json" onChange={importarJSON} className="hidden" />
                                    </label>

                                    <p className={`text-xs mt-3 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                                        Dica: guarde o arquivo .json num lugar seguro (e-mail, Google Drive). É a sua garantia caso algo aconteça.
                                    </p>

                                    <button onClick={() => setMostrarBackup(false)} className="w-full mt-4 py-2 bg-gray-200 text-gray-700 rounded-lg">Fechar</button>
                                </div>
                            </div>
                        )}

                        {/* Modal: personalizar */}
                        {mostrarPersonalizar && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                <div className={`${cardClass} rounded-2xl p-5 w-full max-w-sm shadow-2xl max-h-[85vh] overflow-y-auto`}>
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-lg font-bold">🎨 Personalizar</h3>
                                        <button onClick={() => setMostrarPersonalizar(false)}><Icon name="x" /></button>
                                    </div>

                                    <p className="text-sm font-bold mb-2">Cor de destaque</p>
                                    <div className="flex flex-wrap gap-2 mb-3">
                                        {['#7c3aed','#2563eb','#0891b2','#059669','#16a34a','#ca8a04','#ea580c','#dc2626','#db2777','#4f46e5'].map(c => (
                                            <button key={c} onClick={() => setCorPrimaria(c)}
                                                className={`w-8 h-8 rounded-full border-2 ${corPrimaria.toLowerCase() === c ? 'ring-2 ring-offset-2 ring-gray-400 border-white' : 'border-transparent'}`}
                                                style={{backgroundColor: c}} title={c}></button>
                                        ))}
                                    </div>
                                    <label className="flex items-center gap-2 text-sm mb-5">
                                        <span>Cor personalizada:</span>
                                        <input type="color" value={corPrimaria} onChange={(e) => setCorPrimaria(e.target.value)}
                                            className="w-10 h-8 rounded cursor-pointer bg-transparent" />
                                    </label>

                                    <p className="text-sm font-bold mb-2">Papel de parede</p>
                                    {papelParede ? (
                                        <div className="h-24 rounded-xl bg-cover bg-center mb-2 border border-gray-300" style={{backgroundImage: `url("${papelParede}")`}}></div>
                                    ) : (
                                        <p className="text-xs text-gray-500 mb-2">Nenhum papel de parede.</p>
                                    )}
                                    <div className="flex gap-2 mb-5">
                                        <label className="flex-1 py-2 bg-blue-600 text-white rounded-lg text-center text-sm font-medium cursor-pointer">
                                            📷 Escolher foto
                                            <input type="file" accept="image/*" onChange={aoEscolherPapel} className="hidden" />
                                        </label>
                                        {papelParede && <button onClick={removerPapel} className="flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm">Remover</button>}
                                    </div>

                                    <div className={`my-4 border-t ${darkMode ? 'border-gray-700' : 'border-gray-200'}`}></div>
                                    <p className="text-sm font-bold mb-2">🏷️ Categorias personalizadas</p>
                                    <div className="flex gap-2 mb-2">
                                        <input type="text" placeholder="Nova categoria" value={novaCategoria}
                                            onChange={(e) => setNovaCategoria(e.target.value)}
                                            onKeyPress={(e) => e.key === 'Enter' && executar(adicionarCategoria)}
                                            className={`flex-1 px-3 py-2 rounded-lg border-2 ${inputClass}`} />
                                        <button onClick={() => executar(adicionarCategoria)} disabled={salvando} className="px-4 py-2 bg-purple-600 text-white rounded-lg text-sm disabled:opacity-60">Adicionar</button>
                                    </div>
                                    {categoriasCustomDocs.length === 0 ? (
                                        <p className="text-xs text-gray-500 mb-5">Você ainda não criou categorias próprias. As categorias padrão continuam disponíveis.</p>
                                    ) : (
                                        <div className="flex flex-wrap gap-2 mb-5">
                                            {categoriasCustomDocs.map(c => (
                                                <span key={c.id} className={`inline-flex items-center gap-1.5 pl-2 pr-1 py-1 rounded-lg text-sm ${darkMode ? 'bg-gray-700' : 'bg-gray-100'}`}>
                                                    <span className="w-2.5 h-2.5 rounded-full" style={{backgroundColor: corCategoria(c.nome)}}></span>
                                                    {c.nome}
                                                    <button onClick={() => removerCategoria(c.id)} className="text-red-500 px-1" title="Remover">✕</button>
                                                </span>
                                            ))}
                                        </div>
                                    )}

                                    <div className="flex gap-2">
                                        <button onClick={restaurarPadrao} className="flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm">Restaurar padrão</button>
                                        <button onClick={() => setMostrarPersonalizar(false)} className="flex-1 py-2 bg-purple-600 text-white rounded-lg font-bold">Pronto</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Modal: lembrete de contas a pagar */}
                        {mostrarLembrete && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                <div className={`${cardClass} rounded-2xl p-5 w-full max-w-sm shadow-2xl max-h-[80vh] overflow-y-auto`}>
                                    <div className="flex justify-between items-center mb-3">
                                        <h3 className="text-lg font-bold">🔔 Contas a pagar</h3>
                                        <button onClick={() => setMostrarLembrete(false)}><Icon name="x" /></button>
                                    </div>

                                    {vencidas.length === 0 && venceHoje.length === 0 ? (
                                        <p className="text-center text-gray-500 py-6">Nada vencendo agora. 🎉</p>
                                    ) : (
                                        <>
                                            {vencidas.length > 0 && (
                                                <div className="mb-4">
                                                    <p className="text-sm font-bold text-red-600 mb-2">⚠️ Atrasadas — {formatarMoeda(totalVencidas)}</p>
                                                    <div className="space-y-1">
                                                        {vencidas.map(t => (
                                                            <div key={t.id} className={`flex justify-between items-center text-sm p-2 rounded-lg ${darkMode ? 'bg-gray-700' : 'bg-red-50'}`}>
                                                                <span>{t.descricao} <span className="text-xs text-gray-500">{formatarData(t.data)}</span></span>
                                                                <span className="font-bold text-red-600 whitespace-nowrap">{formatarMoeda(t.valor)}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                            {venceHoje.length > 0 && (
                                                <div className="mb-4">
                                                    <p className="text-sm font-bold text-orange-600 mb-2">📆 Vence hoje — {formatarMoeda(totalVenceHoje)}</p>
                                                    <div className="space-y-1">
                                                        {venceHoje.map(t => (
                                                            <div key={t.id} className={`flex justify-between items-center text-sm p-2 rounded-lg ${darkMode ? 'bg-gray-700' : 'bg-orange-50'}`}>
                                                                <span>{t.descricao}</span>
                                                                <span className="font-bold text-orange-600 whitespace-nowrap">{formatarMoeda(t.valor)}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </>
                                    )}

                                    <div className="flex gap-2 pt-1">
                                        <button onClick={() => setMostrarLembrete(false)} className="flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg">Fechar</button>
                                        <button onClick={() => { setMostrarLembrete(false); setActiveTab('financas'); }} className="flex-1 py-2 bg-purple-600 text-white rounded-lg font-bold">Ver em Finanças</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
